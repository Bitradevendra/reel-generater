# Image Scraper Configuration File
# Customize these settings to modify scraper behavior

[scraper]
# Default search source: 'google' or 'bing'
default_source = bing

# Run in headless mode (no browser window): true or false
headless_mode = true

# Implicit wait time in seconds (timeout for finding elements)
implicit_wait = 10

# Default number of images to target
default_target_count = 50

[scrolling]
# Number of scroll iterations to load lazy-loaded images
max_scrolls = 10

# Pause between scrolls in seconds
scroll_pause = 2.0

# Random delay variation for human-like behavior (in seconds)
random_delay_min = 0.5
random_delay_max = 1.5

[downloading]
# Timeout for each image download in seconds
download_timeout = 10

# Delay between downloads in seconds (respect server)
download_delay_min = 0.5
download_delay_max = 2.0

# Number of retry attempts for failed downloads
max_retries = 3

# Retry backoff factor (exponential)
retry_backoff_factor = 1.0

[output]
# Default output directory pattern
# Use {query} as placeholder for search query
output_pattern = {query}

# Image naming convention
# Options: 'indexed' (query_0001.jpg), 'timestamp' (query_20240101_120000.jpg)
naming_convention = indexed

# Create subdirectories for each query
create_subdirectories = true

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = INFO

# Log file name
log_file = scraper.log

# Maximum log file size in MB (0 = unlimited)
max_log_size = 10

# Keep log file on subsequent runs: true/false
keep_logs = true

[user_agent]
# Rotate User-Agent strings: true/false
rotate_user_agents = true

# Use random delay between requests: true/false
use_random_delays = true

[browser]
# Chrome options (comma-separated)
chrome_options = --no-sandbox, --disable-dev-shm-usage, --disable-gpu, --disable-blink-features=AutomationControlled

[bot_detection]
# Enable stealth mode: true/false
stealth_mode = true

# Add referer header: true/false
add_referer = true

# Accept non-standard image formats: true/false
accept_all_formats = true

# Timeout to simulate human browsing (seconds)
human_behavior_timeout = 2.0

[performance]
# Load images in browser (slower but more reliable)
load_browser_images = false

# Parallel download threads (1 = sequential)
parallel_downloads = 1

# Enable connection pooling
enable_pooling = true

# Pool size for connection reuse
pool_size = 10

[storage]
# Save failed URLs log
save_failed_urls = true

# Compress downloaded images
compress_images = false

# Compression quality (1-100, only if compress_images=true)
compression_quality = 85

[error_handling]
# Continue on download errors
continue_on_error = true

# Skip invalid image URLs
skip_invalid_urls = true

# Validate image checksums
validate_checksums = false

[advanced]
# Disable CSS/JS loading for speed
disable_resources = true

# Resource types to disable (comma-separated)
# Options: stylesheet, script, image, font, xhr, fetch
disable_resource_types = stylesheet,script,font

# Use proxy: none, http, socks5
proxy_type = none

# Proxy address (e.g., http://proxy.example.com:8080)
proxy_address = 

# Proxy username (if required)
proxy_username = 

# Proxy password (if required)
proxy_password = 
