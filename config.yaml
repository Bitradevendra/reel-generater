# ============================================================================
# 🎬 REEL GENERATOR - MASTER CONFIGURATION
# ============================================================================
# All visual, layout, animation, and pipeline settings in one place.
# Modify these values to customize your reel output.

# ── VIDEO RESOLUTION & FORMAT ──────────────────────────────────────────────
video:
  width: 1080                    # Reel width (pixels) - Instagram/YouTube Shorts
  height: 1920                   # Reel height (pixels) - 9:16 aspect ratio
  fps: 30                        # Frames per second
  codec: "libx264"               # Video codec (libx264 for H.264)
  audio_codec: "aac"             # Audio codec
  bitrate: "8000k"               # Video bitrate for quality
  output_format: "mp4"           # Output file format

# ── BACKGROUND ─────────────────────────────────────────────────────────────
background:
  image_path: "background.jpeg"  # Path to background image
  blur_radius: 3                 # Slight blur for depth effect (0 = no blur)
  brightness: 0.85               # Darken background (0.0-1.0, 1.0 = original)
  overlay_color: [0, 0, 0]       # Dark overlay RGB
  overlay_opacity: 0.25          # Overlay opacity (0.0-1.0)

# ── SCRAPED IMAGES PLACEMENT ───────────────────────────────────────────────
images:
  # Position (relative to video dimensions, 0.0-1.0)
  position_x: 0.5               # Horizontal center (0.0=left, 0.5=center, 1.0=right)
  position_y: 0.35              # Slightly above center (0.0=top, 1.0=bottom)

  # Size constraints
  max_width_ratio: 0.80         # Max width as fraction of video width (0.0-1.0)
  max_height_ratio: 0.40       # Max height as fraction of video height (0.0-1.0)
  min_width_ratio: 0.50         # Minimum width ratio (too small = ugly)
  
  # Appearance
  corner_radius: 0              # Match your background box by removing generated corners
  border_width: 0               # Set to 0 so the script doesn't draw its own border!
  border_color: [255, 255, 255] # Border color RGB (white)
  shadow_offset: [0, 0]         # Drop shadow offset (disabled)
  shadow_color: [0, 0, 0]       # Shadow color RGB
  shadow_opacity: 0.0           # Shadow opacity
  shadow_blur: 0                # Shadow blur radius
  
  # Image fit mode: "contain" (fit inside), "cover" (fill area, crop edges)
  fit_mode: "contain"
  
  # Transition between images
  transition_duration: 0.6      # Crossfade duration in seconds
  display_duration_min: 2.5     # Minimum seconds per image
  display_duration_max: 5.0     # Maximum seconds per image

# ── SUBTITLES ──────────────────────────────────────────────────────────────
subtitles:
  # Position
  position_y: 0.15              # Vertical position (0.0=top, 1.0=bottom)
  max_width_ratio: 0.88         # Max subtitle width as fraction of video width
  words_per_screen: 2           # Words to display per chunk for karaoke
  
  # Font
  font_family: "Arial"          # Font family (use system fonts)
  font_size: 50                 # Font size in pixels
  font_bold: true               # Bold text
  
  # Colors
  text_color: [255, 255, 255]   # Main text color RGB (white)
  highlight_color: [255, 215, 0] # Currently-spoken word highlight (gold)
  outline_color: [0, 0, 0]      # Text outline/stroke color
  outline_width: 3               # Outline width in pixels
  
  # Background box
  bg_enabled: true               # Show background box behind text
  bg_color: [0, 0, 0]           # Background box color RGB
  bg_opacity: 0.65              # Background box opacity
  bg_padding: [15, 25, 15, 25]  # Padding [top, right, bottom, left]
  bg_corner_radius: 12          # Rounded corners for bg box
  
  # Word-by-word karaoke highlighting
  karaoke_enabled: true          # Highlight current word
  words_per_line: 6              # Max words per subtitle line
  lines_visible: 2               # Number of visible lines at once
  
  # Animation
  entrance_animation: "fade_up"  # "fade_up", "pop_in", "slide_left", "typewriter"
  exit_animation: "fade_out"     # "fade_out", "slide_down", "pop_out"

# ── ANIMATIONS & EFFECTS ──────────────────────────────────────────────────
animations:
  # Global animation style (can be overridden per-video)
  default_style: "ken_burns"
  
  # Available styles and their parameters
  styles:
    fade_scale:
      description: "Smooth fade-in with subtle scale"
      fade_duration: 0.5
      scale_start: 1.05
      scale_end: 1.0
      
    ken_burns:
      description: "Slow zoom + pan (documentary style)"
      zoom_start: 1.0
      zoom_end: 1.15
      pan_range: 0.05           # How far to pan (fraction of image)
      
    slide_pop:
      description: "Images slide in from sides"
      slide_direction: "alternate"  # "left", "right", "alternate", "random"
      slide_duration: 0.4
      overshoot: 1.1
      
    glitch_neon:
      description: "Trendy glitch transitions"
      glitch_intensity: 0.3
      neon_glow_color: [0, 255, 200]
      rgb_shift: 5
      
    bounce_rotate:
      description: "Playful with slight rotation"
      bounce_height: 20
      rotation_degrees: 2
      spring_damping: 0.8
      
    cinematic:
      description: "Letterbox + dramatic zoom"
      letterbox_ratio: 0.08
      zoom_speed: 0.02
      vignette_strength: 0.3
      
    minimal_clean:
      description: "Simple crossfade (professional)"
      crossfade_duration: 0.8
      
    random_mix:
      description: "Random combination of all above"

# ── SCRIPT GENERATION ──────────────────────────────────────────────────────
script:
  model_path: "script/model.gguf"
  model_type: "qwen2"            # Model architecture (Qwen series)
  gpu_layers: 50                # GPU layers for acceleration
  threads: 8                    # CPU threads
  temperature: 0.8
  top_p: 0.9
  repetition_penalty: 1.1
  words_per_second: 2.2         # For duration calculation
  
  # Fallback to Ollama if ctransformers fails
  ollama_fallback: true
  ollama_model: "deepseek-r1"
  ollama_timeout: 600

# ── VOICE SYNTHESIS ────────────────────────────────────────────────────────
voice:
  language: "en"                 # Default language: "en" or "te"
  engine: "sherpa_onnx"          # "sherpa_onnx" for English
  
  english:
    model_dir: "voice/models/en"
    speaker_id: 46               # Default: "The Narrator" (clear & engaging)
    speed: 0.9                   # Slightly slower (0.9) makes commas/pauses more dramatic and human
    sample_rate: 22050
    
  telugu:
    engine: "meta_mms"
    model_name: "facebook/mms-tts-tel"
    sample_rate: 16000
    speed: 0.85                  # MMS Telugu speaks too fast by default, 0.85 makes it human-paced

# ── IMAGE SCRAPING ─────────────────────────────────────────────────────────
scraping:
  source: "bing"                 # "bing", "google", or "both"
  headless: true                 # Run browser in headless mode
  images_per_keyword: 1          # Exactly 1 image per sentence to prevent flashing
  max_total_images: 15           # Max images per video
  
  # Retry logic
  max_retries: 5                 # Max retries per image download
  retry_delay: 2.0               # Initial retry delay (seconds)
  retry_backoff: 1.5             # Exponential backoff multiplier
  
  # Fallback chain: if primary source fails, try alternatives
  fallback_sources:
    - "bing"
    - "google"
    - "duckduckgo"
  
  # Image validation
  min_image_width: 400           # Minimum pixel width
  min_image_height: 300          # Minimum pixel height
  max_file_size_mb: 10           # Max file size
  
  # NLP keyword extraction
  keyword_extraction:
    method: "rake"               # "rake", "tfidf", "noun_phrases"
    max_keywords_per_sentence: 1 # Exactly 1 image query per sentence
    add_topic_context: true      # Prepend topic to search queries

# ── LANGUAGE TRANSLATION ───────────────────────────────────────────────────
translation:
  enabled: false                 # Enable translation
  model_name: "facebook/nllb-200-distilled-600M"
  source_language: "eng_Latn"
  target_language: "tel_Telu"    # Default target
  quantization: "8bit"           # "8bit" or "none"
  max_tokens: 256
  num_beams: 4

# ── OUTPUT ─────────────────────────────────────────────────────────────────
output:
  base_dir: "output"             # Base output directory
  single_video_dir: "output/single"
  series_dir: "output/series"
  temp_dir: "output/.temp"       # Temporary files (cleaned after)
  
  # Naming
  filename_pattern: "{topic}_{timestamp}"  # Pattern for output filenames
  series_pattern: "{topic}_EP{episode:02d}_{timestamp}"
  
  # Cleanup
  keep_temp_files: false         # Keep intermediate files (audio, images)
  keep_scraped_images: true      # Keep downloaded images

# ── PERFORMANCE ────────────────────────────────────────────────────────────
performance:
  parallel_image_downloads: 4    # Concurrent image downloads
  preload_images: true           # Preload images into memory
  gpu_rendering: true            # Use GPU for video encoding if available
  cache_models: true             # Keep models in memory between videos (series)
